version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: advaya_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: advaya
      POSTGRES_PASSWORD: advaya_secret
      POSTGRES_DB: advaya
    ports:
      - '5432:5432'
    volumes:
      - advaya_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U advaya']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: advaya_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - advaya_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  advaya_postgres_data:
  advaya_redis_data:
